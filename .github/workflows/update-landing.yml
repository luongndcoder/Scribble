name: Update Landing Version

# Bumps the version-specific references in landing/index.html every time a
# release is published as Latest. Triggered by the GitHub `release` event
# (action: `released` or `published`), which fires when we transition a draft
# release to public via `gh release edit --draft=false --latest`.
#
# The 3 download cards and the "Latest version" badge get sed-replaced with
# the new version. The change is committed to main if there's a diff, and
# Vercel auto-deploys on push.
#
# Without this workflow, the landing page would still show the previous
# release's filenames + URLs forever. The client-side hydration script in
# index.html is a belt-and-suspenders fallback (it fetches the GitHub API
# at runtime), but a fresh HTML deploy is more reliable and works without JS.

on:
  release:
    types: [released, published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to bump landing to (e.g. v1.2.8)'
        required: true

permissions:
  contents: write

jobs:
  update-landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # GITHUB_TOKEN by default has contents:write thanks to the permissions
          # block above. We explicitly pass it so the eventual `git push` is
          # authenticated as the workflow rather than the actor (which can lack
          # push rights on protected branches).
          token: ${{ secrets.GITHUB_TOKEN }}
          # Need history so subsequent pushes don't fast-forward-fail.
          fetch-depth: 1

      - name: Resolve target version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Empty tag — release event payload missing tag_name?"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "Target: $TAG (version $VERSION)"

      - name: Bump version references in landing/index.html
        id: bump
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          FILE="landing/index.html"

          if [ ! -f "$FILE" ]; then
            echo "::error::$FILE not found"
            exit 1
          fi

          # Cross-platform sed (-i.bak for BSD, harmless on GNU)
          sed -i.bak -E "s|Scribble_[0-9]+\.[0-9]+\.[0-9]+_aarch64\.dmg|Scribble_${VERSION}_aarch64.dmg|g" "$FILE"
          sed -i.bak -E "s|Scribble_[0-9]+\.[0-9]+\.[0-9]+_x64-setup\.exe|Scribble_${VERSION}_x64-setup.exe|g" "$FILE"
          sed -i.bak -E "s|Scribble_[0-9]+\.[0-9]+\.[0-9]+_amd64\.AppImage|Scribble_${VERSION}_amd64.AppImage|g" "$FILE"

          # Version badge — match any content (latest / vX.Y.Z) inside the span
          sed -i.bak -E "s|<span data-fill=\"version\">[^<]*</span>|<span data-fill=\"version\">${TAG}</span>|" "$FILE"

          rm -f "${FILE}.bak"

          if git diff --quiet "$FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changes — landing already at $TAG"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Landing bumped to $TAG"
            git diff --stat "$FILE"
          fi

      - name: Commit + push
        if: steps.bump.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add landing/index.html
          # Use printf so the multi-line commit body lives inside one bash
          # string — YAML doesn't have to follow our newlines through the
          # block scalar.
          MSG=$(printf 'chore(landing): bump download links to %s\n\nAuto-generated by .github/workflows/update-landing.yml on release publication. Updates the 3 download card URLs + filenames and the "Latest version" badge to point at %s.\n\nCo-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>\n' "$TAG" "$TAG")
          git commit -m "$MSG"

          # Retry-once on push race (another commit landed between checkout
          # and push — rare but possible if two releases publish very close
          # together).
          git push origin main || (git pull --rebase origin main && git push origin main)

      - name: Trigger Vercel deploy
        # Vercel's git auto-deploy is unreliable in this project (saw 4+
        # main pushes go undeployed). Use a Deploy Hook for an explicit
        # rebuild we can audit in CI logs. Set the VERCEL_DEPLOY_HOOK secret
        # to a URL created in Vercel Dashboard → Settings → Git → Deploy Hooks
        # (branch: main). Step no-ops when the secret is absent.
        #
        # Fires when:
        #  - bump created a real commit (changed == 'true'), OR
        #  - workflow was manually dispatched (recovery from a stale deploy)
        if: steps.bump.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK secret not set — landing will rely on Vercel git auto-deploy (which may be flaky)"
            exit 0
          fi
          RESP=$(curl -fsS -X POST "$VERCEL_DEPLOY_HOOK" -o /tmp/vercel-resp.json -w "%{http_code}")
          if [ "$RESP" != "201" ] && [ "$RESP" != "200" ]; then
            echo "::error::Vercel deploy hook returned HTTP $RESP"
            cat /tmp/vercel-resp.json
            exit 1
          fi
          echo "::notice::Vercel deploy triggered (HTTP $RESP)"
          cat /tmp/vercel-resp.json | head -3
