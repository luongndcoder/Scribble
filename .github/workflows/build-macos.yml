name: Build macOS

# Builds Scribble for macOS on every `v*` tag push (universal: aarch64 DMG +
# .app.tar.gz updater artifact). Code-signing strategy:
#
# - If MACOS_CERTIFICATE_P12 + MACOS_CERTIFICATE_PASSWORD secrets are set,
#   the cert is imported into a temp keychain and used as signingIdentity.
#   This keeps the same designated-requirement across releases, so macOS
#   TCC (Privacy → Microphone, Screen Recording, etc.) does NOT prompt the
#   user again after each auto-update. See docs/auto-update.md.
#
# - If those secrets are absent, falls back to ad-hoc signing (`-`).
#   The app still runs, but TCC will treat every new build as a brand-new
#   app and re-prompt for mic / system audio permissions on every update.
#
# Either way the .app.tar.gz updater artifact is signed with the minisign
# keypair (TAURI_SIGNING_PRIVATE_KEY) — that's separate from macOS
# codesigning and is what the Tauri updater verifies before installing.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14    # M-series runner — produces aarch64 (Apple Silicon)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install Python dependencies
        working-directory: src-python
        run: uv pip install --system -r requirements.txt

      - name: Download ONNX diarization model
        working-directory: src-python/models
        run: |
          if [ ! -f voxceleb_CAM++.onnx ]; then
            curl -L -o voxceleb_CAM++.onnx "https://wespeaker-1256283475.cos.ap-shanghai.myqcloud.com/models/voxceleb/voxceleb_CAM++.onnx"
          fi

      - name: Build sidecar
        working-directory: src-python
        run: python -m PyInstaller scribble-sidecar.spec --noconfirm --clean

      - name: Copy sidecar + compress
        run: |
          mkdir -p src-tauri/binaries
          # Strip unnecessary files (mirror Linux/Windows workflow)
          rm -rf src-python/dist/scribble-sidecar/_internal/grpc_tools 2>/dev/null || true
          find src-python/dist/scribble-sidecar/_internal -name "tests" -type d -exec rm -rf {} + 2>/dev/null || true
          find src-python/dist/scribble-sidecar/_internal -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find src-python/dist/scribble-sidecar/_internal -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true
          # Compress
          tar -czf src-tauri/binaries/sidecar-dist.tar.gz -C src-python/dist scribble-sidecar
          # Launcher shim — Tauri externalBin requires a binary named
          # scribble-sidecar-<target-triple>. We point it at the unpacked dist
          # tarball at runtime (Tauri ships sidecar-dist.tar.gz as a resource).
          cat > src-tauri/binaries/scribble-sidecar-aarch64-apple-darwin << 'SHEOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          for candidate in "$DIR/sidecar-dist/scribble-sidecar" "$DIR/../Resources/sidecar-dist/scribble-sidecar"; do
              if [ -x "$candidate" ]; then exec "$candidate" "$@"; fi
          done
          exit 1
          SHEOF
          chmod +x src-tauri/binaries/scribble-sidecar-aarch64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install

      - name: Import code-signing certificate (if available)
        # When MACOS_CERTIFICATE_P12 is set, imports it into a temp keychain
        # and exports the matching identity name for the next step. When the
        # secret is empty, outputs identity="-" so the build falls back to
        # ad-hoc signing. See docs/auto-update.md for setup instructions.
        id: signing
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE_P12" ]; then
            echo "identity=-" >> "$GITHUB_OUTPUT"
            echo "::warning::No MACOS_CERTIFICATE_P12 secret — falling back to ad-hoc signing."
            echo "::warning::macOS TCC permissions (mic, screen recording, etc.) will reset on every update."
            echo "::warning::See docs/auto-update.md to fix this."
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/scribble-build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import with -A so codesign can access the private key without
          # password prompts. The temp keychain is destroyed at job end so the
          # "any app" grant is scoped to this build.
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -A \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign

          # Belt-and-suspenders: also set the partition list so newer macOS
          # versions don't prompt despite the -A flag.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null || true

          # Prepend our keychain to the search list so codesign sees it
          security list-keychain -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed -e 's/^[[:space:]]*//' -e 's/"//g')

          # Diagnostic dump — useful when the .p12 turns out to contain only
          # a public cert (no private key), or the cert lacks codesigning
          # extensions. Each form below filters more leniently than the last.
          echo "=== Keychain diagnostics ==="
          echo "--- find-identity (all, even invalid) ---"
          security find-identity "$KEYCHAIN_PATH" || true
          echo "--- find-identity -v (valid: has private key + not expired) ---"
          security find-identity -v "$KEYCHAIN_PATH" || true
          echo "--- find-identity -v -p codesigning (passes codesigning policy) ---"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          echo "--- find-certificate -a (all certs in keychain) ---"
          security find-certificate -a "$KEYCHAIN_PATH" | grep -E '"labl"<blob>=' | head -5 || true
          echo "==========================="

          # Prefer codesigning-policy identities, but self-signed certs often
          # fail that filter even though codesign itself accepts them. Fall
          # back to any valid identity, then to any identity at all.
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep -E '^[[:space:]]*[0-9]+\)' | head -1 \
            | sed -E 's/^[^"]*"([^"]+)".*$/\1/')

          if [ -z "$IDENTITY" ]; then
            echo "::warning::No identity matched codesigning policy — falling back to any valid identity"
            IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" \
              | grep -E '^[[:space:]]*[0-9]+\)' | head -1 \
              | sed -E 's/^[^"]*"([^"]+)".*$/\1/')
          fi

          if [ -z "$IDENTITY" ]; then
            echo "::warning::No valid identity found — falling back to any identity (cert may not have private key)"
            IDENTITY=$(security find-identity "$KEYCHAIN_PATH" \
              | grep -E '^[[:space:]]*[0-9]+\)' | head -1 \
              | sed -E 's/^[^"]*"([^"]+)".*$/\1/')
          fi

          if [ -z "$IDENTITY" ]; then
            echo "::error::No code-signing identity found in keychain after import."
            echo "::error::The .p12 file probably doesn't include the private key."
            echo "::error::In Keychain Access → My Certificates, right-click the cert (NOT just"
            echo "::error::the certificate sub-entry) → Export as .p12. Re-upload as secret."
            exit 1
          fi

          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "::notice::Code-signing identity loaded: $IDENTITY"

          rm "$CERT_PATH"

      - name: Build Tauri
        # signingIdentity is either the cert imported above (TCC-stable) or
        # "-" (ad-hoc fallback). TAURI_SIGNING_PRIVATE_KEY signs the .app.tar.gz
        # updater artifact (separate from Gatekeeper) — required for auto-update.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          IDENTITY='${{ steps.signing.outputs.identity }}'
          echo "Building with signingIdentity: $IDENTITY"
          npx tauri build --target aarch64-apple-darwin \
            --config "{\"bundle\":{\"macOS\":{\"signingIdentity\":\"$IDENTITY\"}}}"

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Ensure release exists
        # First of the 3 parallel platform builds wins the race + creates the
        # draft; the rest no-op. See build.yml for the rationale.
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --draft --title "$TAG" \
              --notes "Auto-created by CI. Update notes before publishing." || \
            true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          # DMG — first-time install asset
          DMG=$(find src-tauri/target/aarch64-apple-darwin -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            FILENAME="Scribble_${VERSION}_aarch64.dmg"
            cp "$DMG" "$FILENAME"
            gh release upload "$TAG" "$FILENAME" --clobber
            echo "✅ Uploaded: $FILENAME"
          fi

          # app.tar.gz + .sig — updater artifacts (this is what the auto-updater
          # downloads + applies in-place, NOT the DMG)
          TARBALL=$(find src-tauri/target/aarch64-apple-darwin -name "*.app.tar.gz" | head -1)
          if [ -n "$TARBALL" ]; then
            FILENAME="Scribble_${VERSION}_aarch64.app.tar.gz"
            cp "$TARBALL" "$FILENAME"
            gh release upload "$TAG" "$FILENAME" --clobber
            echo "✅ Uploaded: $FILENAME"

            TARBALL_SIG="${TARBALL}.sig"
            if [ -f "$TARBALL_SIG" ]; then
              cp "$TARBALL_SIG" "${FILENAME}.sig"
              gh release upload "$TAG" "${FILENAME}.sig" --clobber
              echo "✅ Uploaded: ${FILENAME}.sig"
            else
              echo "⚠️  No signature — macOS auto-update disabled until TAURI_SIGNING_PRIVATE_KEY is set"
            fi
          fi

          if [ -z "$DMG" ] && [ -z "$TARBALL" ]; then
            echo "❌ No macOS bundle found"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
