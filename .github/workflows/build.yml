name: Build Windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Install Python dependencies
        working-directory: src-python
        run: uv pip install --system -r requirements.txt

      - name: Download ONNX model
        working-directory: src-python/models
        shell: bash
        run: |
          if [ ! -f voxceleb_CAM++.onnx ]; then
            curl -L -o voxceleb_CAM++.onnx "https://wespeaker-1256283475.cos.ap-shanghai.myqcloud.com/models/voxceleb/voxceleb_CAM++.onnx"
          fi

      - name: Build sidecar
        working-directory: src-python
        run: python -m PyInstaller scribble-sidecar.spec --noconfirm --clean

      - name: Copy sidecar + compress
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          # Strip unnecessary files
          rm -rf src-python/dist/scribble-sidecar/_internal/grpc_tools 2>/dev/null || true
          find src-python/dist/scribble-sidecar/_internal -name "tests" -type d -exec rm -rf {} + 2>/dev/null || true
          find src-python/dist/scribble-sidecar/_internal -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find src-python/dist/scribble-sidecar/_internal -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true
          # Compress
          tar -czf src-tauri/binaries/sidecar-dist.tar.gz -C src-python/dist scribble-sidecar
          # Create launcher shim
          cat > src-tauri/binaries/scribble-sidecar-x86_64-pc-windows-msvc.exe << 'WINEOF'
          @echo off
          "%~dp0sidecar-dist\scribble-sidecar.exe" %*
          WINEOF

      - name: Bundle ffmpeg for Windows
        shell: bash
        run: |
          FFMPEG_PATH=$(which ffmpeg || echo "")
          if [ -n "$FFMPEG_PATH" ]; then
            cp "$FFMPEG_PATH" src-tauri/binaries/ffmpeg.exe
          fi

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri NSIS installer
        shell: bash
        # TAURI_SIGNING_PRIVATE_KEY (set in GH Secrets) makes `tauri build` emit
        # a `.sig` file next to the NSIS installer — required by the updater on
        # the client side. If the secret isn't set yet, the build still
        # succeeds but produces no signature (auto-update won't verify).
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build -b nsis --target x86_64-pc-windows-msvc

      - name: Resolve version + installer
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          INSTALLER=$(find src-tauri/target -name "*.exe" -path "*/nsis/*" | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "❌ No NSIS installer found"
            exit 1
          fi
          FILENAME="Scribble_${VERSION}_x64-setup.exe"
          cp "$INSTALLER" "$FILENAME"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "✅ Built: $FILENAME"
          # Tauri auto-signs the installer when TAURI_SIGNING_PRIVATE_KEY is set
          # — emits a `.sig` next to the .exe. We copy it alongside the renamed
          # installer so the manifest job downstream can find it.
          SIG_SRC="${INSTALLER}.sig"
          if [ -f "$SIG_SRC" ]; then
            cp "$SIG_SRC" "${FILENAME}.sig"
            echo "sig_filename=${FILENAME}.sig" >> "$GITHUB_OUTPUT"
            echo "✅ Signature: ${FILENAME}.sig"
          else
            echo "⚠️  No signature found at $SIG_SRC — auto-update will fail until TAURI_SIGNING_PRIVATE_KEY is set in repo secrets"
          fi

      - name: Ensure release exists
        # `gh release upload` requires the release to already exist. We don't
        # gate the workflow on a manual pre-step — instead, the first of the
        # 3 parallel platform builds wins the race and creates the draft;
        # the rest fall through to a no-op `gh release view`. Race-safe
        # because gh returns non-zero on duplicate create, which we swallow.
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --draft --title "$TAG" \
              --notes "Auto-created by CI. Update notes before publishing." || \
            true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release upload "$TAG" "${{ steps.version.outputs.filename }}" --clobber
          # Signature is optional — skip silently if missing (e.g. secret not
          # configured yet). The manifest job will detect and skip Windows.
          if [ -f "${{ steps.version.outputs.filename }}.sig" ]; then
            gh release upload "$TAG" "${{ steps.version.outputs.filename }}.sig" --clobber
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: scribble-windows-installer
          path: |
            ${{ steps.version.outputs.filename }}
            ${{ steps.version.outputs.filename }}.sig
          retention-days: 30
          if-no-files-found: warn
