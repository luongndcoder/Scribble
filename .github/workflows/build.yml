name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
            sidecar: scribble-sidecar-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
            sidecar: scribble-sidecar-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Python dependencies
        working-directory: src-python
        run: pip install -r requirements.txt pyinstaller

      - name: Build sidecar
        working-directory: src-python
        run: python -m PyInstaller scribble-sidecar.spec --noconfirm --clean

      - name: Copy sidecar binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp src-python/dist/scribble-sidecar.exe src-tauri/binaries/${{ matrix.sidecar }}
          else
            cp src-python/dist/scribble-sidecar src-tauri/binaries/${{ matrix.sidecar }}
          fi

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Scribble ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
