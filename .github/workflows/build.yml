name: Build Windows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        working-directory: src-python
        run: uv pip install --system -r requirements.txt

      - name: Build sidecar
        working-directory: src-python
        run: python -m PyInstaller scribble-sidecar.spec --noconfirm --clean

      - name: Copy sidecar binary
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp src-python/dist/scribble-sidecar.exe src-tauri/binaries/scribble-sidecar-x86_64-pc-windows-msvc.exe

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri NSIS installer
        shell: bash
        run: npx tauri build -b nsis --target x86_64-pc-windows-msvc

      - name: Upload to Release v1.1.0
        shell: bash
        run: |
          INSTALLER=$(find src-tauri/target -name "*.exe" -path "*/nsis/*" | head -1)
          if [ -n "$INSTALLER" ]; then
            gh release upload v1.1.0 "$INSTALLER#Scribble_1.1.0_x64-setup.exe" --clobber
            echo "✅ Uploaded: $INSTALLER"
          else
            echo "❌ No NSIS installer found"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
