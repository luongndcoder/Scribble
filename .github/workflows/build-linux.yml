name: Build Linux

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            ffmpeg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        working-directory: src-python
        run: uv pip install --system -r requirements.txt

      - name: Download ONNX model
        working-directory: src-python/models
        run: |
          if [ ! -f voxceleb_CAM++.onnx ]; then
            curl -L -o voxceleb_CAM++.onnx "https://wespeaker-1256283475.cos.ap-shanghai.myqcloud.com/models/voxceleb/voxceleb_CAM++.onnx"
          fi

      - name: Build sidecar
        working-directory: src-python
        run: python -m PyInstaller scribble-sidecar.spec --noconfirm --clean

      - name: Copy sidecar + compress
        run: |
          mkdir -p src-tauri/binaries
          # Strip unnecessary files
          rm -rf src-python/dist/scribble-sidecar/_internal/grpc_tools 2>/dev/null || true
          find src-python/dist/scribble-sidecar/_internal -name "tests" -type d -exec rm -rf {} + 2>/dev/null || true
          find src-python/dist/scribble-sidecar/_internal -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find src-python/dist/scribble-sidecar/_internal -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true
          # Compress
          tar -czf src-tauri/binaries/sidecar-dist.tar.gz -C src-python/dist scribble-sidecar
          # Create launcher shim
          cat > src-tauri/binaries/scribble-sidecar-x86_64-unknown-linux-gnu << 'SHEOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          for candidate in "$DIR/sidecar-dist/scribble-sidecar" "$DIR/../Resources/sidecar-dist/scribble-sidecar"; do
              if [ -x "$candidate" ]; then exec "$candidate" "$@"; fi
          done
          exit 1
          SHEOF
          chmod +x src-tauri/binaries/scribble-sidecar-x86_64-unknown-linux-gnu

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri
        run: npx tauri build

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload to Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          APPIMAGE=$(find src-tauri/target -name "*.AppImage" | head -1)
          if [ -n "$APPIMAGE" ]; then
            FILENAME="Scribble_${VERSION}_amd64.AppImage"
            cp "$APPIMAGE" "$FILENAME"
            gh release upload "$TAG" "$FILENAME" --clobber
            echo "✅ Uploaded: $FILENAME"
          fi

          DEB=$(find src-tauri/target -name "*.deb" | head -1)
          if [ -n "$DEB" ]; then
            FILENAME="scribble_${VERSION}_amd64.deb"
            cp "$DEB" "$FILENAME"
            gh release upload "$TAG" "$FILENAME" --clobber
            echo "✅ Uploaded: $FILENAME"
          fi

          if [ -z "$APPIMAGE" ] && [ -z "$DEB" ]; then
            echo "❌ No Linux bundle found"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
