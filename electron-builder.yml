appId: com.scribble.app
productName: Scribble

directories:
  output: dist
  buildResources: build

files:
  - server.js
  - db.js
  - package.json
  - public/**/*
  - proto/**/*
  - electron/**/*
  - node_modules/**/*

# Unpack native addons from asar (better-sqlite3, ffmpeg-static)
asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"
  - "**/node_modules/ffmpeg-static/**/*"
  - "**/node_modules/@grpc/**/*"

# Windows
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Scribble

# macOS
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64          # thêm nếu cần support Intel
  icon: build/icon.png
  category: public.app-category.productivity
  identity: "Scribble Dev"
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist   # ✅ file riêng
  extendInfo:
    NSMicrophoneUsageDescription: "Scribble needs microphone access to record and transcribe your meetings."
    NSScreenCaptureUsageDescription: "Scribble needs screen recording access to capture system audio for transcription."
    NSAudioCaptureUsageDescription: "Scribble needs system audio access to record and transcribe system audio."

dmg:
  iconSize: 100
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
