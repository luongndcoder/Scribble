# ─────────────────────────────────────────────
# Meeting Minutes — Docker Compose
# ─────────────────────────────────────────────
#
# USAGE:
#
#   🌩️  Cloud mode (Groq/Nvidia STT, no local model):
#       docker compose up app
#
#   💻 Local mode (with Parakeet STT on-device):
#       docker compose --profile local up
#
#   🔨 Build & run:
#       docker compose --profile local up --build
#
# ─────────────────────────────────────────────

services:
  # ─── Main App (Node.js) ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meeting-minutes
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - STT_SERVICE_URL=http://stt:5555
    volumes:
      - meetings-db:/app/data
      - audio-files:/app/audio_files
      - uploads:/app/uploads
    restart: unless-stopped

  # ─── Local Parakeet STT Service (Optional) ───
  stt:
    build:
      context: .
      dockerfile: Dockerfile.stt
    container_name: meeting-minutes-stt
    profiles:
      - local
    ports:
      - "5555:5555"
    environment:
      - STT_BACKEND=local
      - STT_PREPROCESS=true
      - STT_PORT=5555
    volumes:
      - model-cache:/root/.cache
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

volumes:
  meetings-db:
  audio-files:
  uploads:
  model-cache:
